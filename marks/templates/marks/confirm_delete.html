{% extends 'marks/base.html' %}

{% block title %}Delete Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4 text-center">
            <div style="font-size: 56px;">⚠️</div>
            <h4 class="fw-bold mt-2">Confirm Delete</h4>
            <p class="text-muted">
                Are you sure you want to delete
                <strong>{{ student.name }}</strong> ({{ student.roll_no }})?
                <br>This action <span class="text-danger">cannot be undone.</span>
            </p>

            <form method="POST">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-3 mt-3">
                    <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
                    <a href="{% url 'marks:student_list' %}"
                       class="btn btn-outline-secondary px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

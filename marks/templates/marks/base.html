<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Marks Manager{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .navbar { background-color: #1e3a5f !important; }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .stat-card {
            border-radius: 12px;
            color: white;
            padding: 20px;
        }
        .table thead { background-color: #1e3a5f; color: white; }
        .btn-add {
            background-color: #1e3a5f;
            color: white;
            border: none;
        }
        .btn-add:hover { background-color: #16304f; color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
    <a class="navbar-brand fw-bold fs-5" href="{% url 'marks:student_list' %}">
        🎓 Student Marks Manager
    </a>
    <a href="{% url 'marks:student_add' %}" class="btn btn-outline-light btn-sm">
        + Add Student
    </a>
</nav>

<div class="container mt-3">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
</div>

<div class="container mt-3 mb-5">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
